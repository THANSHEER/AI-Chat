name: Release

on:
    push:
        tags:
            - "[0-9]*.[0-9]*.[0-9]*"

permissions:
    contents: write
    id-token: write
    attestations: write

jobs:
    release:
        name: Build & publish release
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  # Full history is required so generate_release_notes
                  # can compare against the previous tag correctly.
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Verify release artifacts
              run: |
                  test -f main.js       || (echo "main.js missing"       && exit 1)
                  test -f manifest.json || (echo "manifest.json missing" && exit 1)
                  test -f styles.css    || (echo "styles.css missing"    && exit 1)

            - name: Attest main.js
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: main.js

            - name: Attest manifest.json
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: manifest.json

            - name: Attest styles.css
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: styles.css

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  files: |
                      main.js
                      manifest.json
                      styles.css
                  generate_release_notes: true
                  make_latest: true
